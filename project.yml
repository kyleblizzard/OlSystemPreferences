name: OlSystemPreferences
options:
  bundleIdPrefix: com.olsystempreferences
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_IDENTITY: "-"
    ENABLE_HARDENED_RUNTIME: YES
    COMBINE_HIDPI_IMAGES: YES
targets:
  OlSystemPreferences:
    type: application
    platform: macOS
    sources:
      - path: OlSystemPreferences
        excludes:
          - "**/.DS_Store"
    dependencies:
      - framework: /System/Library/Frameworks/ScreenSaver.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.olsystempreferences.app
        INFOPLIST_FILE: OlSystemPreferences/Info.plist
        PRODUCT_NAME: OlSystemPreferences
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: OlSystemPreferences/OlSystemPreferences.entitlements
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../Frameworks"
